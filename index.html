<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Renovo Co. — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
:root {
  --green: #1e3a2f;
  --green-light: #2d5240;
  --green-hover: #163025;
  --gold: #c9a96e;
  --gold-light: #f0e6d0;
  --bg: #f7f5f1;
  --surface: #ffffff;
  --border: #e2ddd6;
  --text: #1a1a1a;
  --muted: #6b7280;
  --danger: #dc2626;
  --success: #16a34a;
  --warning: #d97706;
  --info: #0284c7;
  --r: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --sidebar-w: 220px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
h1,h2,h3 { font-family: 'Playfair Display', serif; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; font-size: 14px; border: none; background: none; }
input, select, textarea { font-family: inherit; font-size: 14px; }

/* LAYOUT */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--green); }
#app-shell { display: flex; height: 100vh; overflow: hidden; }
.hidden { display: none !important; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--green); color: #e8f5e9;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-brand { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sidebar-brand h2 { font-size: 20px; color: #fff; letter-spacing: .5px; }
.sidebar-brand p { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
#sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; color: rgba(255,255,255,.75);
  cursor: pointer; transition: all .15s; font-size: 14px; font-weight: 500;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,.12); color: #fff; border-left-color: var(--gold); }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1); }
.sidebar-user { font-size: 13px; color: rgba(255,255,255,.8); margin-bottom: 10px; }
.sidebar-user strong { display: block; color: #fff; }
.sidebar-user span { font-size: 11px; color: var(--gold); }
.btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); border-radius: var(--r); font-size: 13px; transition: background .15s; }
.btn-logout:hover { background: rgba(255,255,255,.15); color: #fff; }

/* MAIN */
#main-content { flex: 1; overflow-y: auto; background: var(--bg); }
.page-header { padding: 28px 32px 0; display: flex; align-items: center; justify-content: space-between; }
.page-header h1 { font-size: 28px; color: var(--green); }
.page-body { padding: 24px 32px 40px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--r); font-weight: 500; transition: all .15s; font-size: 14px; }
.btn-primary { background: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-hover); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { background: #b8944f; }
.btn-sm { padding: 5px 12px; font-size: 13px; }
.btn-full { width: 100%; justify-content: center; }
.btn-icon { padding: 6px 8px; }

/* CARDS */
.card { background: var(--surface); border-radius: var(--r); box-shadow: var(--shadow); padding: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-title { font-size: 16px; font-weight: 600; }

/* STATS GRID */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border-radius: var(--r); box-shadow: var(--shadow); padding: 20px; }
.stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-size: 32px; font-family: 'Playfair Display', serif; color: var(--green); font-weight: 700; }
.stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 14px; font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); border-bottom: 2px solid var(--border); font-weight: 600; white-space: nowrap; }
td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #faf9f7; }
.td-actions { display: flex; gap: 6px; }

/* BADGES */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; white-space: nowrap; }
.badge-gray { background: #f3f4f6; color: #374151; }
.badge-blue { background: #dbeafe; color: #1d4ed8; }
.badge-yellow { background: #fef3c7; color: #92400e; }
.badge-green { background: #dcfce7; color: #166534; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-gold { background: var(--gold-light); color: #7c5a1e; }
.badge-purple { background: #ede9fe; color: #5b21b6; }

/* FORMS */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.form-full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 13px; font-weight: 500; color: #374151; }
.form-group input, .form-group select, .form-group textarea {
  padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); color: var(--text); transition: border-color .15s;
  width: 100%;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--green);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group input.error, .form-group select.error { border-color: var(--danger); }
.form-hint { font-size: 12px; color: var(--muted); }

/* LOGIN */
.login-card { background: var(--surface); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: var(--shadow-md); }
.login-brand { text-align: center; margin-bottom: 32px; }
.login-brand h1 { font-size: 32px; color: var(--green); }
.login-brand p { font-size: 14px; color: var(--muted); margin-top: 4px; }
.login-form { display: flex; flex-direction: column; gap: 16px; }
.login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 8px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal {
  background: var(--surface); border-radius: 12px; width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-lg { max-width: 720px; }
.modal-xl { max-width: 880px; }
.modal-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 20px; color: var(--green); }
.modal-close { font-size: 22px; color: var(--muted); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
.modal-close:hover { background: var(--bg); color: var(--text); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px 24px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--border); }

/* FILTERS */
.filter-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: var(--r); padding: 4px; width: fit-content; margin-bottom: 20px; }
.filter-tab { padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; }
.filter-tab.active { background: var(--surface); color: var(--green); box-shadow: var(--shadow); }

/* CHECKLIST */
.checklist-category { margin-bottom: 20px; }
.checklist-category h4 { font-size: 13px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 10px; font-weight: 600; font-family: 'DM Sans', sans-serif; }
.checklist-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--r); cursor: pointer; transition: background .1s; margin-bottom: 4px; }
.checklist-item:hover { background: var(--bg); }
.checklist-item input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--green); flex-shrink: 0; cursor: pointer; }
.checklist-item span { font-size: 14px; }
.checklist-item.done span { text-decoration: line-through; color: var(--muted); }
.checklist-progress { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
.checklist-progress-bar { height: 100%; background: var(--green); border-radius: 3px; transition: width .3s; }

/* ACTIVITY */
.activity-list { display: flex; flex-direction: column; gap: 1px; }
.activity-item { padding: 10px 0; display: flex; align-items: flex-start; gap: 12px; border-bottom: 1px solid var(--border); }
.activity-item:last-child { border-bottom: none; }
.activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 5px; }
.activity-text { font-size: 13px; color: var(--text); line-height: 1.4; }
.activity-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* MEDIA GRID */
.media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.media-item { position: relative; border-radius: var(--r); overflow: hidden; background: var(--border); aspect-ratio: 1; }
.media-item img { width: 100%; height: 100%; object-fit: cover; }
.media-item-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; gap: 8px; }
.media-item:hover .media-item-overlay { opacity: 1; }
.upload-zone { border: 2px dashed var(--border); border-radius: var(--r); padding: 40px; text-align: center; cursor: pointer; transition: all .15s; }
.upload-zone:hover, .upload-zone.drag { border-color: var(--green); background: #f0f7f3; }
.upload-zone p { color: var(--muted); font-size: 14px; margin-top: 8px; }

/* TOASTS */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--text); color: #fff; padding: 12px 18px; border-radius: var(--r); font-size: 14px; box-shadow: var(--shadow-md); pointer-events: all; display: flex; align-items: center; gap: 10px; max-width: 360px; animation: slideIn .2s ease; }
.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-warning { background: var(--warning); }
@keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }
.empty-state .sub { font-size: 13px; margin-top: 6px; }

/* MISC */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: var(--r); padding: 14px 16px; font-size: 13px; color: #1e40af; line-height: 1.5; }
.info-box.warning { background: #fffbeb; border-color: #fde68a; color: #78350f; }
.info-box.success { background: #f0fdf4; border-color: #bbf7d0; color: #14532d; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.section-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: var(--green); }
.text-muted { color: var(--muted); }
.text-sm { font-size: 13px; }
.mb-4 { margin-bottom: 4px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mb-24 { margin-bottom: 24px; }
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.items-center { align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.job-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.detail-row { display: flex; flex-direction: column; gap: 2px; padding: 10px; background: var(--bg); border-radius: var(--r); }
.detail-label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 600; }
.detail-value { font-size: 14px; font-weight: 500; }
.price-breakdown { background: var(--bg); border-radius: var(--r); padding: 14px; font-size: 13px; }
.price-row { display: flex; justify-content: space-between; padding: 3px 0; }
.price-row.total { font-weight: 600; font-size: 15px; border-top: 1px solid var(--border); margin-top: 6px; padding-top: 8px; }
.spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.tag { display: inline-block; padding: 2px 8px; background: var(--gold-light); color: #7c5a1e; border-radius: 4px; font-size: 12px; font-weight: 500; }
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- LOGIN -->
<div id="login-screen" class="hidden">
  <div class="login-card">
    <div class="login-brand">
      <h1>Renovo Co.</h1>
      <p>Operations Platform</p>
    </div>
    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="you@renovoco.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
      <p id="login-err" class="login-error hidden"></p>
    </form>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-brand">
      <h2>Renovo Co.</h2>
      <p>Operations</p>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div id="sidebar-user" class="sidebar-user"></div>
      <button class="btn-logout" onclick="handleSignOut()">Sign Out</button>
    </div>
  </aside>
  <main id="main-content"></main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="handleOverlayClick(event)">
  <div id="modal-container"></div>
</div>

<script src="/app-core.js"></script>
<script src="/app-pages.js"></script>
</body>
</html>
