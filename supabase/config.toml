# ============================================================
# Supabase CLI Configuration — Renovo Co. CRM
# Project ref: qofwwztuykerlcxfuutv
# ============================================================

[project]
id = "qofwwztuykerlcxfuutv"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://renovo-co.vercel.app"
additional_redirect_urls = ["https://renovo-co.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Disable public signup — this is a private CRM, users must be created by admins
enable_signup = false

[auth.email]
# Disable self-serve email signup
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"

[[functions]]
name = "booking-webhook"
enabled = true

[[functions]]
name = "quickbooks-oauth"
enabled = true

[[functions]]
name = "quickbooks-callback"
enabled = true

[[functions]]
name = "quickbooks-sync"
enabled = true

[[functions]]
name = "quickbooks-payment-check"
enabled = true
